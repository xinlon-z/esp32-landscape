name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    env:
      IDF_COMPONENT_CACHE_PATH: /root/.idf-components

    steps:
      - uses: actions/checkout@v4

      - name: Cache IDF managed components
        uses: actions/cache@v4
        with:
          path: /root/.idf-components
          key: idf-components-${{ hashFiles('main/idf_component.yml', 'dependencies.lock') }}
          restore-keys: idf-components-

      - name: Create secrets stub
        run: cp main/clock_secrets_example.h main/clock_secrets.h

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Create merged flash binary
        run: |
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin \
            -o build/landscape_clock-merged.bin \
            0x0    build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/landscape_clock.bin

      - name: Stage release files
        run: |
          mkdir dist
          cp build/landscape_clock.bin                      dist/
          cp build/landscape_clock-merged.bin               dist/
          cp build/bootloader/bootloader.bin                dist/
          cp build/partition_table/partition-table.bin      dist/
          cp build/flash_args                               dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          retention-days: 30
          path: dist/

  test:
    name: Host Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build-tests -S tests

      - name: Build
        run: cmake --build build-tests --parallel

      - name: Run
        run: ctest --test-dir build-tests --output-on-failure

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/landscape_clock.bin
            firmware/landscape_clock-merged.bin
            firmware/bootloader.bin
            firmware/partition-table.bin
            firmware/flash_args
          generate_release_notes: true
