name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    env:
      IDF_COMPONENT_CACHE_PATH: /root/.idf-components

    steps:
      - uses: actions/checkout@v4

      - name: Cache IDF managed components
        uses: actions/cache@v4
        with:
          path: /root/.idf-components
          key: idf-components-${{ hashFiles('main/idf_component.yml', 'dependencies.lock') }}
          restore-keys: idf-components-

      - name: Create secrets stub
        run: cp main/clock_secrets_example.h main/clock_secrets.h

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          idf.py build

      - name: Create merged flash binary
        run: |
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin \
            -o build/landscape_clock-merged.bin \
            0x0    build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/landscape_clock.bin

      - name: Package release
        run: |
          VERSION="${{ github.ref_name }}"
          ZIP="landscape_clock-${VERSION}.zip"

          mkdir dist
          cp build/landscape_clock.bin                    dist/landscape_clock.bin
          cp build/landscape_clock-merged.bin             dist/landscape_clock-merged.bin
          cp build/bootloader/bootloader.bin              dist/bootloader.bin
          cp build/partition_table/partition-table.bin    dist/partition-table.bin
          # Strip build-directory prefixes so flash_args works from the ZIP root
          sed 's|[^ ]*/||g' build/flash_args            > dist/flash_args

          cd dist
          sha256sum landscape_clock-merged.bin landscape_clock.bin \
                    bootloader.bin partition-table.bin > sha256sums.txt

          cat > README.txt << READEOF
          Landscape Clock Firmware ${VERSION}
          ===================================

          Target hardware : Waveshare ESP32-S3-Touch-LCD-3.49
          ESP-IDF version : v6.0.1

          REQUIREMENTS
          ------------
            Python 3 with esptool:  pip install esptool


          FLASHING
          --------

          Full installation or factory reset (recommended for first-time setup):
            Writes bootloader, partition table, and application in a single pass.

            esptool.py --chip esp32s3 -b 460800 \\
                --before default-reset --after hard-reset \\
                write_flash --flash-mode dio --flash-size 16MB --flash-freq 80m \\
                0x0 landscape_clock-merged.bin

          Application update only (preserves NVS partition and Wi-Fi credentials):

            esptool.py --chip esp32s3 -b 460800 \\
                --before default-reset --after hard-reset \\
                write_flash 0x10000 landscape_clock.bin

          Scripted flash using the included argument file:

            esptool.py --chip esp32s3 -b 460800 \\
                --before default-reset --after hard-reset \\
                write_flash @flash_args


          FILES
          -----
            landscape_clock-merged.bin   Full image: bootloader + partition table + app
            landscape_clock.bin          Application partition only
            bootloader.bin               Second-stage bootloader
            partition-table.bin          Partition table
            flash_args                   write_flash arguments (paths relative to this dir)
            sha256sums.txt               SHA-256 checksums for all binary files


          CHECKSUM VERIFICATION
          ---------------------
            sha256sum -c sha256sums.txt
          READEOF

          python3 -m zipfile -c "../${ZIP}" README.txt sha256sums.txt \
              landscape_clock-merged.bin landscape_clock.bin \
              bootloader.bin partition-table.bin flash_args
          cd ..
          sha256sum "${ZIP}" > "${ZIP}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          retention-days: 30
          path: |
            landscape_clock-*.zip
            landscape_clock-*.sha256

  test:
    name: Host Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build-tests -S tests

      - name: Build
        run: cmake --build build-tests --parallel

      - name: Run
        run: ctest --test-dir build-tests --output-on-failure

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware/*.zip
            firmware/*.sha256
          generate_release_notes: true
